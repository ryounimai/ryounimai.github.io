<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#06101e">
  <title>ŘΨØŬ — Anime & Drama</title>
  <link rel="icon" href="/res/favicon.ico">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/res/icon-192.png">
  <!-- Fonts -->
  <link rel="stylesheet" href="/assets/fonts/fonts.css">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="/assets/bootstrap/bootstrap.min.css">
  <!-- Swiper -->
  <link rel="stylesheet" href="/assets/swiper/swiper-bundle.min.css">
  <!-- App CSS -->
  <link rel="stylesheet" href="/assets/css/vars.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/nav.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <!-- Admin lock style -->
  <style>
    .admin-lock-btn {
      display:inline-flex; align-items:center; cursor:pointer;
      padding:3px 8px; border-radius:var(--r-pill);
      background:var(--bg-float); border:1px solid var(--bdr-subtle);
      color:var(--txt-tertiary); font-size:10px; font-weight:700;
      transition:all .15s;
    }
    .admin-lock-btn:hover { border-color:var(--clr-accent); color:var(--clr-accent); }
    .admin-lock-btn.unlocked { border-color:var(--clr-success); color:var(--clr-success); }
    .admin-btn:disabled { opacity:.45; cursor:not-allowed; filter:grayscale(.6); }
  </style>
</head>
<body data-bs-theme="dark">

<!-- Splash -->
<div id="splash">
  <div class="splash-content">
    <img class="splash-logo" src="/res/logo.svg" alt="RYOU">
    <div class="splash-title">ŘΨØŬ</div>
    <div class="splash-sub">Media Server</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- Nav -->
<nav id="app-nav"></nav>
<div id="drawer-backdrop" class="backdrop"></div>
<aside id="app-drawer"></aside>

<!-- Hero Carousel -->
<div class="hero-section page-body">
  <div id="hero-swiper" class="swiper hero-swiper">
    <div class="swiper-wrapper"></div>
    <div class="swiper-pagination"></div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
  </div>
</div>

<!-- Main content -->
<div class="main-wrap">
  <!-- Continue watching -->
  <section class="section" id="section-continue">
    <div class="section-hd">
      <h2 data-i18n="continue_watching">Lanjut Nonton</h2>
    </div>
    <div id="continue-wrap"></div>
  </section>

  <!-- Top Series -->
  <section class="section" id="section-series">
    <div class="section-hd">
      <h2 data-i18n="top_series">Top Series</h2>
    </div>
    <div id="hs-series"></div>
  </section>

  <!-- Top Movies -->
  <section class="section" id="section-movies">
    <div class="section-hd">
      <h2 data-i18n="top_movies">Top Film</h2>
    </div>
    <div id="hs-movies"></div>
  </section>

  <!-- All titles -->
  <section class="section">
    <div class="section-hd">
      <h2 data-i18n="all_titles">Semua Judul</h2>
      <button class="btn btn-ghost btn-sm" id="btn-filter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Filter
      </button>
    </div>
    <div id="main-grid"></div>
    <div id="main-pagination"></div>
  </section>
</div>

<!-- Filter Panel -->
<div id="filter-backdrop" class="backdrop"></div>
<div id="filter-panel" class="filter-panel">
  <div class="filter-panel-hd">
    <span class="filter-panel-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filter
    </span>
    <button class="btn btn-icon btn-ghost" id="filter-close">✕</button>
  </div>
  <div class="filter-panel-body" id="filter-body"></div>
  <div class="filter-panel-ft">
    <button class="btn btn-ghost" id="filter-reset" style="flex:1" data-i18n="filter_reset">Reset</button>
    <button class="btn btn-primary" id="filter-apply" style="flex:2" data-i18n="filter_apply">Terapkan</button>
  </div>
</div>

<!-- History Panel -->
<div id="history-backdrop" class="backdrop"></div>
<aside id="history-panel" class="watch-sidebar" style="width:min(360px,92vw);right:0;top:0;height:100vh;position:fixed;z-index:var(--z-modal);transform:translateX(100%);transition:transform var(--dur-slow) var(--ease);border-left:1px solid var(--bdr-strong)">
  <div class="ws-header" style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px">
    <span style="font-size:15px;font-weight:700" data-i18n="history">Riwayat</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" id="history-clear-btn" data-i18n="history_clear">Hapus</button>
      <button class="btn btn-icon btn-ghost" id="history-close">✕</button>
    </div>
  </div>
  <div class="ws-list" id="history-list"></div>
</aside>

<!-- Settings Panel -->
<div id="settings-backdrop" class="backdrop"></div>
<aside id="settings-panel">
  <div class="settings-hd">
    <span class="settings-title" data-i18n="settings">Pengaturan</span>
    <button class="btn btn-icon btn-ghost" id="settings-close">✕</button>
  </div>
  <div class="settings-body">
    <div class="settings-section">
      <div class="settings-section-label" data-i18n="settings_lang">Bahasa</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" data-setlang="id">ID</button>
        <button class="btn btn-ghost btn-sm" data-setlang="en">EN</button>
        <button class="btn btn-ghost btn-sm" data-setlang="ja">JA</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-label">Pemutaran</div>
      <div class="settings-row">
        <div><div class="settings-row-label" data-i18n="settings_autoplay">Autoplay next</div></div>
        <input type="checkbox" id="setting-autoplay" style="width:18px;height:18px;accent-color:var(--clr-accent)">
      </div>
      <div class="settings-row">
        <div><div class="settings-row-label" data-i18n="settings_subtitle">Subtitle</div></div>
        <input type="checkbox" id="setting-subtitle" style="width:18px;height:18px;accent-color:var(--clr-accent)">
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-label" style="display:flex;align-items:center;justify-content:space-between">
        <span data-i18n="settings_scan">Library</span>
        <button id="admin-unlock-btn" class="admin-lock-btn" title="Admin" onclick="AdminLock.toggle()">
          <svg id="admin-lock-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span id="admin-lock-label" style="font-size:10px;margin-left:4px">Admin</span>
        </button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-outline admin-btn" id="btn-scan" data-i18n="settings_scan" disabled>Scan Library</button>
        <button class="btn btn-ghost admin-btn" id="btn-force-scan" data-i18n="settings_force_scan" disabled>Scan Ulang (paksa)</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-label" data-i18n="settings_clear_cache">Cache</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-ghost admin-btn" id="btn-clear-lib" data-i18n="settings_clear_lib" disabled>Hapus Cache Library</button>
        <button class="btn btn-danger btn-sm admin-btn" id="btn-clear-all" data-i18n="settings_clear_all" disabled>Hapus Semua Cache</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-label">Server Info</div>
      <div class="settings-row"><span class="settings-row-label" data-i18n="settings_version">Versi</span><span class="settings-row-val" id="info-version">—</span></div>
      <div class="settings-row"><span class="settings-row-label" data-i18n="settings_path">SD Card</span><span class="settings-row-val" id="info-path" style="font-size:11px;word-break:break-all">—</span></div>
    </div>
  </div>
</aside>

<!-- Toast -->
<div id="toast-area"></div>

<!-- Footer -->
<footer id="app-footer"></footer>

<!-- Scripts -->
<script src="/assets/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/swiper/swiper-bundle.min.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/lib/store.js"></script>
<script src="/lib/i18n.js"></script>
<script src="/lib/api.js"></script>
<script src="/components/footer.js"></script>
<script src="/components/splash.js"></script>
<script src="/components/nav.js"></script>
<script src="/components/carousel.js"></script>
<script src="/components/section.js"></script>
<script src="/components/index.js"></script>
<script src="/res/pwa.js" defer></script>
<script>

    goDetail: id => location.href = `/details.html?id=${id}`,
    goWatch : (id, ep = 1) => location.href = `/watch.html?id=${id}&ep=${ep}`,
    goHome  : () => location.href = '/',
  };
  document.addEventListener('DOMContentLoaded', () => {
    Nav.init();
    Footer.init();
    IndexComp.init();
  });
</script>

<script>
/* ── AdminLock — PIN default: 1234 (lihat README.md) ── */
const AdminLock = (() => {
  const PIN_KEY = 'ryou_admin_unlocked';
  const DEFAULT_PIN = '1234';

  function _isUnlocked() {
    return sessionStorage.getItem(PIN_KEY) === '1';
  }

  function _setUI(unlocked) {
    const btn = document.getElementById('admin-unlock-btn');
    const icon = document.getElementById('admin-lock-icon');
    const label = document.getElementById('admin-lock-label');
    document.querySelectorAll('.admin-btn').forEach(b => { b.disabled = !unlocked; });
    if (!btn) return;
    if (unlocked) {
      btn.classList.add('unlocked');
      if (icon) icon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 8.5-.5"/>';
      if (label) label.textContent = 'Unlock';
    } else {
      btn.classList.remove('unlocked');
      if (icon) icon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
      if (label) label.textContent = 'Admin';
    }
  }

  function toggle() {
    if (_isUnlocked()) {
      sessionStorage.removeItem(PIN_KEY);
      _setUI(false);
      return;
    }
    const pin = prompt('PIN Admin:');
    if (pin === null) return;
    if (pin === DEFAULT_PIN) {
      sessionStorage.setItem(PIN_KEY, '1');
      _setUI(true);
    } else {
      alert('PIN salah.');
    }
  }

  function init() { _setUI(_isUnlocked()); }

  return { toggle, init };
})();

document.addEventListener('DOMContentLoaded', () => AdminLock.init());
</script>
</body>
</html>
