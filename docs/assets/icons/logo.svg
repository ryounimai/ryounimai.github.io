<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon Mark: stylized "R" play button -->
  <rect x="2" y="4" width="52" height="52" rx="12" fill="url(#rg1)"/>
  <!-- Play arrow inside -->
  <polygon points="20,18 20,42 40,30" fill="white" opacity="0.9" filter="url(#glow)"/>
  <!-- R letter overlay -->
  <text x="16" y="38" font-family="'Inter','Sora',system-ui" font-weight="900" font-size="26" fill="white" opacity="0.0">R</text>
  <!-- Accent dots -->
  <circle cx="46" cy="14" r="3" fill="white" opacity="0.7"/>
  <circle cx="40" cy="10" r="2" fill="white" opacity="0.4"/>

  <!-- Wordmark: RYOU -->
  <text x="66" y="28" font-family="'Sora','Inter',system-ui" font-weight="900" font-size="22" fill="url(#rg1)" letter-spacing="-0.5">RYOU</text>
  <!-- Wordmark: STREAM -->
  <text x="66" y="48" font-family="'Sora','Inter',system-ui" font-weight="700" font-size="14" fill="#94a3b8" letter-spacing="4">STREAM</text>

  <!-- Separator line -->
  <rect x="64" y="33" width="80" height="1" fill="url(#rg2)" opacity="0.4" rx="1"/>

  <!-- Epsilon badge -->
  <rect x="162" y="38" width="52" height="16" rx="4" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="0.5"/>
  <text x="188" y="50" font-family="'Inter',system-ui" font-weight="600" font-size="9" fill="#a78bfa" text-anchor="middle" letter-spacing="1">ε EPSILON</text>
</svg>
