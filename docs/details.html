<body data-bs-theme="dark">

<nav id="app-nav"></nav>

<script>
  window.App = {
    goDetail: id => location.href = `/details.html?id=${id}`,
    goWatch : (id, ep=1) => location.href = `/watch.html?id=${id}&ep=${ep}`,
    goHome  : () => location.href = '/',
  };
  document.addEventListener('DOMContentLoaded', () => {
    const id = new URLSearchParams(location.search).get('id');
    if (!id) { location.href = '/'; return; }
    Nav.init();
    Footer.init();
    Details.init(id);
  });
</script>
