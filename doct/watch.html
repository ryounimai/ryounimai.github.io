<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>ŘΨØŬ — Watch</title>
  <link rel="icon" href="/res/favicon.ico">
  <link rel="stylesheet" href="/assets/fonts/fonts.css">
  <link rel="stylesheet" href="/assets/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/videojs/video-js.min.css">
  <link rel="stylesheet" href="/assets/css/vars.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/nav.css">
  <link rel="stylesheet" href="/assets/css/player.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
</head>
<body data-bs-theme="dark" class="page-watch">

<nav id="app-nav"></nav>
<div id="drawer-backdrop" class="backdrop"></div>
<aside id="app-drawer"></aside>

<div class="page-body page-body--watch">
  <div id="watch-page"></div>
</div>

<div id="toast-area"></div>
<footer id="app-footer"></footer>

<script src="/assets/bootstrap/bootstrap.bundle.min.js"></script>
<script src="/assets/videojs/video.min.js"></script>
<script src="/assets/videojs/lang/id.js"></script>
<script src="/assets/videojs/lang/en.js"></script>
<script src="/assets/videojs/lang/ja.js"></script>
<script src="/assets/js/utils.js"></script>
<script src="/lib/store.js"></script>
<script src="/lib/i18n.js"></script>
<script src="/lib/api.js"></script>
<script src="/components/footer.js"></script>
<script src="/components/splash.js"></script>
<script src="/components/nav.js"></script>
<script src="/components/watch.js"></script>
<script src="/res/pwa.js" defer></script>
<script>
  window.App = {
    goDetail: id => location.href = `/details.html?id=${id}`,
    goWatch : (id, ep=1) => location.href = `/watch.html?id=${id}&ep=${ep}`,
    goHome  : () => location.href = '/',
  };
  document.addEventListener('DOMContentLoaded', () => {
    const p = new URLSearchParams(location.search);
    const id = p.get('id'), ep = parseInt(p.get('ep')) || 1;
    if (!id) { location.href = '/'; return; }
    Nav.init();
    Footer.init();
    WatchComp.init(id, ep);
  });
</script>

<script>
/* ── DRM: Global block contextmenu on player area ── */
document.addEventListener('DOMContentLoaded', () => {
  document.addEventListener('contextmenu', e => {
    if (e.target.closest('.watch-player-box, .video-js')) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
});
</script>
</body>
</html>
